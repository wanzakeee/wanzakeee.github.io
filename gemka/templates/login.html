<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: #161623; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); width: 100%; max-width: 360px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #334; background: #0f0f1a; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #4e54c8; border: none; border-radius: 6px; color: #fff; font-weight: bold; cursor: pointer; }
        button:hover { background: #6469ff; }
        a { color: #8f94fb; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>Вход в мессенджер</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Юзернейм" required>
            <input type="password" name="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
        </form>
        <p style="margin-top:20px;"><a href="/register">Нет аккаунта? Зарегистрироваться</a></p>
    </div>
</body>
</html>

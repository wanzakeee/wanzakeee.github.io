<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мессенджер</title>
    <style>
        /* Тема по умолчанию (Темная) */
        :root {
            --bg-main: #121214;
            --bg-sidebar: #1a1a1e;
            --text-color: #ffffff;
            --accent: #0088cc;
            --border-color: #2c2c35;
        }
        /* Светлая тема */
        body.light-theme {
            --bg-main: #ffffff;
            --bg-sidebar: #f0f2f5;
            --text-color: #000000;
            --accent: #0088cc;
            --border-color: #dddddd;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg-main); color: var(--text-color); margin: 0; display: flex; height: 100vh; transition: 0.3s; }
        .sidebar { width: 320px; background: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); }
        
        .header { padding: 15px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .search-box, .creation-box { padding: 10px; border-bottom: 1px solid var(--border-color); }
        input, select { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-main); color: var(--text-color); box-sizing: border-box; margin-bottom: 5px; }
        
        .list-container { flex: 1; overflow-y: auto; padding: 10px; }
        .list-item { padding: 10px; border-radius: 6px; cursor: pointer; margin-bottom: 5px; background: rgba(255,255,255,0.05); }
        .list-item:hover { background: var(--accent); color: white; }

        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 12px; background: rgba(255,255,255,0.1); align-self: flex-start; }
        .msg.own { background: var(--accent); align-self: flex-end; color: white; }
        
        .input-panel { padding: 15px; border-top: 1px solid var(--border-color); display: flex; gap: 10px; }
        .input-panel input { flex: 1; margin: 0; }
        button { padding: 8px 15px; background: var(--accent); border: none; color: white; border-radius: 6px; cursor: pointer; }
        
        /* Модалка настроек */
        .settings-panel { padding: 15px; border-top: 1px solid var(--border-color); }
    </style>
</head>
<body class="{{ 'light-theme' if user.theme == 'light' else '' }}">

    <div class="sidebar">
        <div class="header">
            <strong>{{ user.nickname }}</strong>
            <a href="/logout" style="color: red; text-decoration: none; font-size: 14px;">Выйти</a>
        </div>
        
        <div class="search-box">
            <input type="text" id="userSearch" placeholder="🔍 Глобальный поиск людей..." oninput="searchUsers()">
            <div id="searchResults"></div>
        </div>

        <div class="creation-box">
            <input type="text" id="chatName" placeholder="Название новой группы/канала">
            <select id="chatType">
                <option value="public_group">Публичная группа</option>
                <option value="private_group">Приватная группа</option>
                <option value="public_channel">Публичный канал</option>
                <option value="private_channel">Приватный канал</option>
            </select>
            <button onclick="createChat()" style="width:100%">Создать</button>
        </div>

        <div class="list-container">
            <h4>Группы и каналы</h4>
            {% for chat in public_chats %}
                <div class="list-item">📢 {{ chat.name }} <small>({{ chat.type }})</small></div>
            {% endfor %}
        </div>

        <div class="settings-panel">
            <h4>Настройки</h4>
            <label>Никнейм:</label>
            <input type="text" id="setNickname" value="{{ user.nickname }}">
            
            <label>Тема оформления:</label>
            <select id="setTheme" onchange="toggleThemeInline()">
                <option value="dark" {% if user.theme == 'dark' %}selected{% endif %}>Темная</option>
                <option value="light" {% if user.theme == 'light' %}selected{% endif %}>Светлая</option>
            </select>

            <label>Кто может искать меня:</label>
            <select id="setPrivacy">
                <option value="1" {% if user.privacy_search == 1 %}selected{% endif %}>Все (Публичный)</option>
                <option value="0" {% if user.privacy_search == 0 %}selected{% endif %}>Никто (Скрыт)</option>
            </select>
            <button onclick="saveSettings()" style="width:100%; margin-top:5px; background:#28a745;">Сохранить настройки</button>
        </div>
    </div>

    <div class="chat-area">
        <div class="header">
            <h3 id="currentChatTitle">Выберите чат или пользователя для общения</h3>
        </div>
        <div class="messages" id="messageBox">
            <div class="msg">Добро пожаловать в безопасный мессенджер!</div>
            <div class="msg own">Здесь шифруются сессии и хэшируются пароли.</div>
        </div>
        <div class="input-panel">
            <input type="text" id="messageInput" placeholder="Напишите сообщение...">
            <button onclick="sendMessage()">Отправить</button>
        </div>
    </div>

    <script>
        // Переключение темы «на лету» без перезагрузки
        function toggleThemeInline() {
            const theme = document.getElementById('setTheme').value;
            if (theme === 'light') {
                document.body.classList.add('light-theme');
            } else {
                document.body.classList.remove('light-theme');
            }
        }

        // Глобальный асинхронный поиск пользователей
        async function searchUsers() {
            const query = document.getElementById('userSearch').value;
            const resDiv = document.getElementById('searchResults');
            if(query.length < 2) { resDiv.innerHTML = ''; return; }
            
            const response = await fetch(`/api/search_users?q=${query}`);
            const users = await response.json();
            
            resDiv.innerHTML = '';
            users.forEach(u => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerText = `${u.nickname} (@${u.username})`;
                div.onclick = () => {
                    document.getElementById('currentChatTitle').innerText = `Чат с ${u.nickname}`;
                };
                resDiv.appendChild(div);
            });
        }

        // Создание группы/канала через API
        async function createChat() {
            const name = document.getElementById('chatName').value;
            const type = document.getElementById('chatType').value;
            if(!name) return alert('Введите название');

            const response = await fetch('/api/create_chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name, type})
            });
            if (response.ok) {
                alert('Успешно создано! Обновите страницу.');
                location.reload();
            }
        }

        // Сохранение настроек профиля, темы и конфиденциальности
        async function saveSettings() {
            const nickname = document.getElementById('setNickname').value;
            const theme = document.getElementById('setTheme').value;
            const privacy_search = document.getElementById('setPrivacy').value;

            const response = await fetch('/api/update_profile', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({nickname, theme, privacy_search: parseInt(privacy_search)})
            });
            if (response.ok) alert('Настройки применились!');
        }

        function sendMessage() {
            const inp = document.getElementById('messageInput');
            if(!inp.value.trim()) return;
            const box = document.getElementById('messageBox');
            const msg = document.createElement('div');
            msg.className = 'msg own';
            msg.innerText = inp.value;
            box.appendChild(msg);
            inp.value = '';
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
